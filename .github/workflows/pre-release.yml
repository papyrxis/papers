name: Pre-Release (Latest Draft)

on:
  push:
    branches:
      - main
    paths:
      - '**.tex'
      - '**.bib'
      - 'configs/**'
      - '.pxis/**'
      - 'workspace.yml'
      - '.github/workflows/pre-release.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build all papers to PDF (parallel matrix)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build PDFs
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends make git bash python3 python3-yaml

      - name: Sync workspace (.pxis/)
        run: |
          if [[ ! -f .pxis/preset.tex ]]; then
            echo "::notice::.pxis/preset.tex missing — running workspace sync"
            bash workspace/src/sync.sh
          fi

      - name: Build all papers
        run: make build

      - name: Collect PDFs
        id: collect
        run: |
          mkdir -p release/
          find build/ -maxdepth 1 -name "*.pdf" -exec cp {} release/ \;
          count=$(find release/ -name "*.pdf" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Built $count PDF(s):"
          ls -lh release/*.pdf 2>/dev/null || echo "  (none)"

      - name: Fail if no PDFs built
        if: steps.collect.outputs.count == '0'
        run: |
          echo "::error::No PDFs were produced. Check LaTeX logs above."
          exit 1

      - name: Upload PDFs artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-pdfs
          path: release/*.pdf
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Publish / update the stable "latest" pre-release tag
  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Latest Draft
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: latest-pdfs
          path: release/

      - name: Build date
        id: meta
        run: |
          echo "date=$(date -u '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u '+%H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Remove existing latest-pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest-pre-release >/dev/null 2>&1 \
            && gh release delete latest-pre-release --yes --cleanup-tag \
            || true

      - name: Collect paper list for release body
        id: papers
        run: |
          LIST=""
          for pdf in release/*.pdf; do
            [[ -f "$pdf" ]] || continue
            name="$(basename "$pdf")"
            LIST="${LIST}- \`${name}\`"$'\n'
          done
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-pre-release
          name: "Latest Draft — ${{ steps.meta.outputs.date }}"
          body: |
            Automated draft build from `main`. PDFs are rebuilt on every push.

            | Field  | Value |
            |--------|-------|
            | Date   | `${{ steps.meta.outputs.date }}` |
            | Time   | `${{ steps.meta.outputs.time }}` |
            | Commit | [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |

            **Papers in this build:**

            ${{ steps.papers.outputs.list }}

            > This is a rolling draft snapshot, not a stable release.
            > For stable releases, see the [releases page](${{ github.server_url }}/${{ github.repository }}/releases?q=v*).
          files: release/*.pdf
          prerelease: true
          draft: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}