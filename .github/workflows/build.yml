name: Build

on:
  workflow_call:
    inputs:
      version:
        description: "Version string embedded in the build (e.g. v0.3.1-pre)"
        required: false
        type: string
        default: "dev"
    outputs:
      papers-artifact:
        description: "Name of the uploaded papers artifact"
        value: ${{ jobs.papers.outputs.artifact-name }}
      resumes-artifact:
        description: "Name of the uploaded resumes artifact"
        value: ${{ jobs.resumes.outputs.artifact-name }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 — Papers (pdflatex + biber)
  # ─────────────────────────────────────────────────────────────────────────
  papers:
    name: Build Papers
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    outputs:
      artifact-name: ${{ steps.set-name.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0           # needed for git describe inside px.py

      - name: Install prerequisites
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git make bash python3
          echo "pdflatex: $(pdflatex --version | head -1)"
          echo "biber:    $(biber --version)"
          echo "python3:  $(python3 --version)"

      - name: Build all papers
        env:
          PROJECT_VERSION: ${{ inputs.version }}
          BUILD_DATE: ${{ github.run_started_at }}
        run: python3 scripts/px.py papers build all

      - name: Show pdflatex logs on failure
        if: failure()
        run: |
          for log in build/*/main.log; do
            if [ -f "$log" ]; then
              echo "\n========== $log =========="
              grep -A 5 "^!" "$log" || true
            fi
          done

      - name: Set artifact name
        id: set-name
        run: echo "name=papers-${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Upload paper PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.name }}
          path: build/*.pdf
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — Resumes (xelatex, English + Farsi)
  # ─────────────────────────────────────────────────────────────────────────
  resumes:
    name: Build Resumes
    runs-on: ubuntu-latest

    outputs:
      artifact-name: ${{ steps.set-name.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install TeX Live (xelatex + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-arabic \
            fonts-liberation \
            fonts-noto \
            fonts-noto-cjk \
            fonts-vazirmatn \
            fontconfig \
            python3
          fc-cache -fv >/dev/null 2>&1 || true
          echo "xelatex: $(xelatex --version | head -1)"
          echo "python3: $(python3 --version)"
          fc-list | grep -i vazir || echo "WARNING: Vazirmatn font not found!"

      - name: Build all resumes (EN + FA)
        run: python3 scripts/px.py resumes build all

      - name: Show xelatex logs on failure
        if: failure()
        run: |
          for log in build/resumes/*/resume.log; do
            if [ -f "$log" ]; then
              echo "\n========== $log =========="
              grep -A 5 "^!" "$log" || true
            fi
          done

      - name: Set artifact name
        id: set-name
        run: echo "name=resumes-${{ inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Upload resume PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.name }}
          path: build/Mahdi-Mamashli-Resume*.pdf
          retention-days: 30
          if-no-files-found: error