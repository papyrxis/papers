name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.0.0
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v1.0.0-hotfix (still stable, just suffixed)

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1 — compile everything (delegated to reusable workflow)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (reusable)
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }}   # e.g. "v1.0.0"

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2 — publish stable release
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Download artifacts ────────────────────────────────────────────────
      - name: Download paper PDFs
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.papers-artifact }}
          path: dist/papers

      - name: Download resume PDFs
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.resumes-artifact }}
          path: dist/resumes

      - name: List files to be released
        run: |
          echo "=== Papers ===" && ls -lh dist/papers/
          echo "=== Resumes ===" && ls -lh dist/resumes/

      # ── Changelog from git log since last stable tag ──────────────────────
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"

          # Find the previous vX.Y.Z tag (skip pre-release tags)
          PREV_TAG="$(git tag --list 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | grep -v "$VERSION" \
            | tail -1 || true)"

          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
            SINCE_MSG="Changes since \`${PREV_TAG}\`"
          else
            RANGE="HEAD"
            SINCE_MSG="Initial release"
          fi

          COMMITS="$(git log "$RANGE" --oneline --no-merges | head -30 || true)"

          BUILD_TIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

          PAPERS_LIST=""
          for f in dist/papers/*.pdf; do
            PAPERS_LIST="${PAPERS_LIST}- \`$(basename "$f")\`\n"
          done

          RESUMES_LIST=""
          for f in dist/resumes/*.pdf; do
            RESUMES_LIST="${RESUMES_LIST}- \`$(basename "$f")\`\n"
          done

          cat > release_body.md << EOF
          ## 🚀 ${VERSION}

          **${SINCE_MSG}** — built on ${BUILD_TIME}

          ---

          ### 📚 مقالات / Papers

          $(echo -e "$PAPERS_LIST")

          ### 📋 رزومه / Resumes

          $(echo -e "$RESUMES_LIST")

          ---

          ### 📝 تغییرات / Changelog

          \`\`\`
          ${COMMITS:-No commits found}
          \`\`\`

          ---

          > **نسخه پایدار** — برای آخرین build غیررسمی به \`latest-pre-release\` مراجعه کنید.
          > *Stable release — for the latest unofficial build see \`latest-pre-release\`.*
          EOF

          echo "Generated release body:"
          cat release_body.md

      # ── Create the stable GitHub release ─────────────────────────────────
      - name: Create stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_body.md \
            --verify-tag \
            dist/papers/*.pdf \
            dist/resumes/*.pdf