name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build all papers
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build All Papers
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install prerequisites
        run: |
          apt-get update
          apt-get install -y --no-install-recommends make git bash python3 python3-yaml

      - name: Sync workspace (.pxis/)
        run: |
          if [[ ! -f .pxis/preset.tex ]]; then
            echo "::notice::Running workspace sync (no committed .pxis/preset.tex found)"
            bash workspace/src/sync.sh
          fi

      - name: Build all papers
        run: make build

      - name: Collect and verify PDFs
        id: collect
        run: |
          mkdir -p release/
          find build/ -maxdepth 1 -name "*.pdf" -exec cp {} release/ \;
          count=$(find release/ -name "*.pdf" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Built $count PDF(s):"
          ls -lh release/ || echo "  (none)"
          if [[ "$count" -eq 0 ]]; then
            echo "::error::No PDFs produced — check LaTeX build logs above."
            exit 1
          fi

      - name: Upload PDFs artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-pdfs
          path: release/*.pdf
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Create the GitHub Release
  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: release-pdfs
          path: release/

      - name: Extract version
        id: ver
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Determine pre-release flag
        id: pre
        run: |
          [[ "${{ steps.ver.outputs.version }}" == *-* ]] \
            && echo "flag=true" >> "$GITHUB_OUTPUT" \
            || echo "flag=false" >> "$GITHUB_OUTPUT"

      - name: Build paper list
        id: papers
        run: |
          LIST=""
          for pdf in release/*.pdf; do
            [[ -f "$pdf" ]] || continue
            name="$(basename "$pdf")"
            size="$(du -sh "$pdf" | cut -f1)"
            LIST="${LIST}- \`${name}\` (${size})"$'\n'
          done
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          DATE="$(date -u '+%Y-%m-%d')"

          if [[ -f CHANGELOG.md ]] && grep -q "## \[$VERSION\]" CHANGELOG.md; then
            sed -n "/## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > body.md
          else
            cat > body.md <<EOF
          ## Release ${TAG}

          See [CHANGELOG](CHANGELOG.md) for full history.
          EOF
          fi

          # Append paper list
          {
            echo ""
            echo "---"
            echo ""
            echo "**Papers in this release:**"
            echo ""
            echo "${{ steps.papers.outputs.list }}"
            echo ""
            echo "---"
            echo ""
            echo "_Built on ${DATE} from tag \`${TAG}\`._"
          } >> body.md

          echo "--- body.md ---"
          cat body.md

      - name: Delete existing release for this tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1 \
            && gh release delete "${{ steps.ver.outputs.tag }}" --yes \
            || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.ver.outputs.tag }}"
          body_path: body.md
          files: release/*.pdf
          draft: false
          prerelease: ${{ steps.pre.outputs.flag }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest-release pointer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only update the latest pointer for stable (non-pre) releases
          if [[ "${{ steps.pre.outputs.flag }}" == "false" ]]; then
            echo "Stable release — updating 'latest' pointer"
            gh release view latest-release >/dev/null 2>&1 \
              && gh release delete latest-release --yes --cleanup-tag \
              || true

            # Copy PDFs to a release tagged "latest-release"
            cp release release-latest -r 2>/dev/null || cp -r release release-latest

            gh release create latest-release \
              --title "Latest Stable — ${{ steps.ver.outputs.tag }}" \
              --notes "Points to the latest stable release: \`${{ steps.ver.outputs.tag }}\`

          > This tag is always updated to match the most recent stable release.
          > See [${{ steps.ver.outputs.tag }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}) for the full release notes." \
              --latest=false \
              release-latest/*.pdf || true
          fi